name: Deploy to VPS

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Build
        run: GOOS=linux GOARCH=arm64 go build -o tui-portfolio-linux .

      - name: Upload binary
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345 # v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          port: 2222
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          known_hosts: ${{ secrets.VPS_HOST_KEY }}
          source: tui-portfolio-linux
          target: /root/tui-portfolio-linux.new

      - name: Deploy atomically
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          port: 2222
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          known_hosts: ${{ secrets.VPS_HOST_KEY }}
          script: |
            mv /root/tui-portfolio-linux.new/tui-portfolio-linux /root/tui-portfolio-linux
            rmdir /root/tui-portfolio-linux.new
            systemctl restart tui-portfolio

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: tui-portfolio-linux
          generate_release_notes: true
